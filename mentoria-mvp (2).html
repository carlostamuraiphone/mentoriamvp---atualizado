/* ═══ SHARED UI ═══ */
function Toast({message,type="success",onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[onClose]);return(<div style={{position:"fixed",top:20,right:16,left:16,zIndex:9999,background:type==="success"?"#10b981":type==="error"?"#ef4444":"#f59e0b",color:"#fff",padding:"13px 18px",borderRadius:12,fontSize:14,fontWeight:500,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",animation:"slideIn .3s ease",maxWidth:380,margin:"0 auto",textAlign:"center"}}>{message}</div>);}

function Modal({title,onClose,children}){const m=useIsMobile();return(<div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:m?"flex-end":"center",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)"}} onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:"#111",border:"1px solid #222",borderRadius:m?"20px 20px 0 0":16,width:m?"100%":500,maxWidth:"100vw",maxHeight:m?"92vh":"90vh",overflow:"auto",animation:"modalIn .2s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",borderBottom:"1px solid #222",position:"sticky",top:0,background:"#111",zIndex:2}}><h3 style={{margin:0,fontSize:17,fontWeight:600,color:"#fff"}}>{title}</h3><button onClick={onClose} style={{background:"none",border:"none",color:"#666",cursor:"pointer",padding:4}}><I.X/></button></div><div style={{padding:18}}>{children}</div></div></div>);}

function Input({label,type="text",value,onChange,placeholder,...p}){const[sh,sSh]=useState(false);const ip=type==="password";return(<div style={{marginBottom:13}}>{label&&<label style={{display:"block",marginBottom:4,fontSize:11,color:"#888",fontWeight:500,letterSpacing:".3px",textTransform:"uppercase"}}>{label}</label>}<div style={{position:"relative"}}><input type={ip&&sh?"text":type} value={value} onChange={onChange} placeholder={placeholder} style={{width:"100%",padding:"10px 13px",paddingRight:ip?40:13,background:"#0a0a0a",border:"1px solid #333",borderRadius:10,color:"#fff",fontSize:15,outline:"none",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor="#555"} onBlur={e=>e.target.style.borderColor="#333"} {...p}/>{ip&&<button onClick={()=>sSh(!sh)} type="button" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#666",cursor:"pointer"}}>{sh?<I.EyeOff/>:<I.Eye/>}</button>}</div></div>);}

function Select({label,value,onChange,options}){return(<div style={{marginBottom:13}}>{label&&<label style={{display:"block",marginBottom:4,fontSize:11,color:"#888",fontWeight:500,letterSpacing:".3px",textTransform:"uppercase"}}>{label}</label>}<select value={value} onChange={onChange} style={{width:"100%",padding:"10px 13px",background:"#0a0a0a",border:"1px solid #333",borderRadius:10,color:"#fff",fontSize:15,outline:"none",boxSizing:"border-box"}}>{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>);}

function Btn({children,onClick,variant="primary",size="md",style:sx,disabled,...p}){const b={border:"none",cursor:disabled?"not-allowed":"pointer",fontWeight:600,borderRadius:10,display:"inline-flex",alignItems:"center",gap:8,transition:"all .2s",opacity:disabled?.5:1};const sz={sm:{padding:"7px 11px",fontSize:13},md:{padding:"10px 16px",fontSize:14},lg:{padding:"12px 22px",fontSize:15}};const vr={primary:{background:"#fff",color:"#000"},secondary:{background:"#1a1a1a",color:"#fff",border:"1px solid #333"},danger:{background:"#1a0a0a",color:"#ef4444",border:"1px solid #331111"},ghost:{background:"transparent",color:"#888"}};return(<button onClick={onClick} disabled={disabled} style={{...b,...sz[size],...vr[variant],...sx}} {...p}>{children}</button>);}

function Textarea({label,value,onChange,placeholder,rows=3}){return(<div style={{marginBottom:13}}>{label&&<label style={{display:"block",marginBottom:4,fontSize:11,color:"#888",fontWeight:500,letterSpacing:".3px",textTransform:"uppercase"}}>{label}</label>}<textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{width:"100%",padding:"10px 13px",background:"#0a0a0a",border:"1px solid #333",borderRadius:10,color:"#fff",fontSize:15,outline:"none",resize:"vertical",boxSizing:"border-box"}}/></div>);}

function Av({name,size=44}){return(<div style={{width:size,height:size,borderRadius:"50%",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:size*.4,flexShrink:0}}>{(name||"?").charAt(0).toUpperCase()}</div>);}
function Empty({icon,text}){return(<div style={{textAlign:"center",padding:"50px 20px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:16}}>{icon}<p style={{color:"#444",fontSize:14,marginTop:12}}>{text}</p></div>);}

/* ═══ HELPERS ═══ */
function pvUrl(url){if(!url)return null;const yp=[/(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,/(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,/(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,/(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,/(?:youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/];for(const p of yp){const m=url.match(p);if(m)return{type:"youtube",embed:`https://www.youtube.com/embed/${m[1]}`,watch:`https://www.youtube.com/watch?v=${m[1]}`};}const vm=url.match(/vimeo\.com\/(\d+)/);if(vm)return{type:"vimeo",embed:`https://player.vimeo.com/video/${vm[1]}`,watch:`https://vimeo.com/${vm[1]}`};return{type:"other",embed:url,watch:url};}
function fmtDate(d){if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;}

/* ═══ VIDEO PLAYER ═══ */
function VidPlayer({info,url}){const[loading,setLd]=useState(true);useEffect(()=>setLd(true),[url]);const pn=info?.type==="youtube"?"YouTube":info?.type==="vimeo"?"Vimeo":"Vídeo";return(<div style={{width:"100%",aspectRatio:"16/9",background:"#080808",position:"relative",overflow:"hidden"}}>{loading&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:2,background:"#080808"}}><div style={{width:34,height:34,border:"3px solid #333",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite",marginBottom:12}}/><div style={{color:"#888",fontSize:13}}>Carregando...</div></div>}<iframe key={info?.embed} src={info?.embed} style={{width:"100%",height:"100%",border:"none",position:"absolute",inset:0}} allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen" allowFullScreen onLoad={()=>setLd(false)}/><a href={info?.watch||url} target="_blank" rel="noopener noreferrer" style={{position:"absolute",bottom:10,right:10,zIndex:5,padding:"5px 10px",background:"rgba(0,0,0,.75)",borderRadius:8,color:"#fff",fontSize:11,fontWeight:500,textDecoration:"none",display:"flex",alignItems:"center",gap:4,opacity:.6,backdropFilter:"blur(8px)"}}><I.ExtLink/>{pn}</a></div>);}

/* ═══ ATTACHMENTS EDITOR (TASK 3+4 FIX: deep-copy safe) ═══ */
function AttEdit({atts=[],onChange}){
  const[t,sT]=useState("");const[u,sU]=useState("");const[tp,sTp]=useState("link");
  const add=()=>{if(!t||!u)return;onChange([...atts,{id:gid(),tipo:tp,title:t,url:u}]);sT("");sU("");};
  const remove=(id)=>onChange(atts.filter(x=>x.id!==id));
  return(<div style={{marginBottom:13}}>

/* Admin Students */
function ASts({sts,mods,onSave,tt}){const[sh,sSh]=useState(false);const[eId,sEId]=useState(null);const[f,sF]=useState({name:"",email:"",password:"",assignedModules:[]});const[sr,sSr]=useState("");
  const save=()=>{if(!f.name||!f.email||(!eId&&!f.password)){tt("Preencha campos obrigatórios","error");return;}if(eId){onSave(sts.map(s=>{if(s.id!==eId)return s;const u={...s,name:f.name,email:f.email,assignedModules:f.assignedModules};if(f.password.trim())u.password=f.password;return u;}));tt("Atualizado!");}else{if(sts.some(s=>s.email===f.email)){tt("E-mail já existe","error");return;}onSave([...sts,{...f,id:gid()}]);tt("Cadastrado!");}sSh(false);};
  const togM=id=>{const a=f.assignedModules||[];sF({...f,assignedModules:a.includes(id)?a.filter(x=>x!==id):[...a,id]});};

    {sts.length>3&&<div style={{position:"relative",marginBottom:14}}><div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#444"}}><I.Search/></div><input value={sr} onChange={e=>sSr(e.target.value)} placeholder="Buscar..." style={{width:"100%",padding:"10px 13px 10px 38px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:10,color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/></div>}
    {fil.length===0?<Empty icon={<I.Users/>} text={sts.length===0?"Nenhum aluno":"Sem resultados"}/>:<div style={{display:"grid",gap:7}}>{fil.map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 14px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:12,gap:10}}><div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}><Av name={s.name} size={38}/><div style={{minWidth:0}}><div style={{color:"#fff",fontWeight:600,fontSize:14}}>{s.name}</div><div style={{color:"#555",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.email}</div></div></div><div style={{display:"flex",gap:3,flexShrink:0}}><Btn variant="ghost" size="sm" onClick={()=>{sF({name:s.name,email:s.email,password:"",assignedModules:s.assignedModules||[]});sEId(s.id);sSh(true);}}><I.Edit/></Btn><Btn variant="ghost" size="sm" onClick={()=>{onSave(sts.filter(x=>x.id!==s.id));tt("Removido");}} style={{color:"#ef4444"}}><I.Trash/></Btn></div></div>))}</div>}
    {sh&&<Modal title={eId?"Editar Aluno":"Novo Aluno"} onClose={()=>sSh(false)}><Input label="Nome" value={f.name} onChange={e=>sF({...f,name:e.target.value})} placeholder="Nome"/><Input label="E-mail" type="email" value={f.email} onChange={e=>sF({...f,email:e.target.value})} placeholder="email@ex.com"/><Input label={eId?"Nova Senha (vazio=manter)":"Senha"} type="password" value={f.password} onChange={e=>sF({...f,password:e.target.value})} placeholder="••••••••"/>{mods.length>0&&<div style={{marginBottom:13}}><label style={{display:"block",marginBottom:5,fontSize:11,color:"#888",fontWeight:500,textTransform:"uppercase"}}>Módulos</label><div style={{display:"grid",gap:5}}>{mods.map(m=>{const on=(f.assignedModules||[]).includes(m.id);return(<button key={m.id} onClick={()=>togM(m.id)} type="button" style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:on?"#1a1a1a":"#0a0a0a",border:`1px solid ${on?"#333":"#1a1a1a"}`,borderRadius:10,cursor:"pointer",color:on?"#fff":"#666"}}><div style={{width:18,height:18,borderRadius:5,border:`2px solid ${on?"#fff":"#333"}`,display:"flex",alignItems:"center",justifyContent:"center",background:on?"#fff":"transparent",flexShrink:0}}>{on&&<I.Check s={12}/>}</div><span style={{fontSize:13,fontWeight:500}}>{m.title}</span></button>);})}</div></div>}<div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><Btn variant="secondary" onClick={()=>sSh(false)}>Cancelar</Btn><Btn onClick={save}>{eId?"Salvar":"Cadastrar"}</Btn></div></Modal>}

/* ═══ Admin Modules (TASK 3 FIX: deep-copy lesson form to avoid shared mutation) ═══ */
function AMods({mods,sts,onSave,tt}){const[smm,sSmm]=useState(false);const[slm,sSlm]=useState(false);const[em,sEm]=useState(null);const[el,sEl]=useState(null);const[am,sAm]=useState(null);const[mf,sMf]=useState({title:"",description:""});const[lf,sLf]=useState({title:"",type:"video",url:"",description:"",attachments:[]});const[exp,sExp]=useState({});
  const savM=()=>{if(!mf.title){tt("Nome obrigatório","error");return;}if(em){onSave(mods.map(m=>m.id===em?{...m,title:mf.title,description:mf.description}:m));tt("Atualizado!");}else{onSave([...mods,{title:mf.title,description:mf.description,id:gid(),lessons:[]}]);tt("Criado!");}sSmm(false);};
  /* TASK 3 FIX: when saving lesson, build a clean new object and deep-copy attachments */
  const savL=()=>{if(!lf.title){tt("Título obrigatório","error");return;}
    const cleanLesson={title:lf.title,type:lf.type,url:lf.url,description:lf.description,attachments:JSON.parse(JSON.stringify(lf.attachments||[]))};
    onSave(mods.map(m=>{if(m.id!==am)return m;if(el){return{...m,lessons:m.lessons.map(l=>l.id===el?{...l,...cleanLesson}:l)};}return{...m,lessons:[...m.lessons,{...cleanLesson,id:gid()}]};}));
    tt(el?"Atualizada!":"Adicionada!");sSlm(false);
  };
  /* TASK 3 FIX: open lesson form with deep copy */
  const openLessonEdit=(modId,lesson)=>{sAm(modId);sLf({title:lesson.title,type:lesson.type,url:lesson.url,description:lesson.description||"",attachments:JSON.parse(JSON.stringify(lesson.attachments||[]))});sEl(lesson.id);sSlm(true);};
  const openLessonNew=(modId)=>{sAm(modId);sLf({title:"",type:"video",url:"",description:"",attachments:[]});sEl(null);sSlm(true);};

  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:10}}><div><h1 style={{color:"#fff",fontSize:24,fontWeight:700,margin:0}}>Módulos</h1><p style={{color:"#555",fontSize:14,margin:"2px 0 0"}}>{mods.length} módulo(s)</p></div><Btn onClick={()=>{sMf({title:"",description:""});sEm(null);sSmm(true);}}><I.Plus/>Novo</Btn></div>
    {mods.length===0?<Empty icon={<I.Book/>} text="Crie seu primeiro módulo"/>:<div style={{display:"grid",gap:9}}>{mods.map((m,mi)=>(<div key={m.id} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,overflow:"hidden"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 14px",cursor:"pointer"}} onClick={()=>sExp(p=>({...p,[m.id]:!p[m.id]}))}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:30,height:30,borderRadius:8,background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>{mi+1}</div><div><div style={{color:"#fff",fontWeight:600,fontSize:14}}>{m.title}</div><div style={{color:"#555",fontSize:11}}>{m.lessons.length} aula(s)</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:3}}><Btn variant="ghost" size="sm" onClick={e=>{e.stopPropagation();sMf({title:m.title,description:m.description});sEm(m.id);sSmm(true);}}><I.Edit/></Btn><Btn variant="ghost" size="sm" onClick={e=>{e.stopPropagation();onSave(mods.filter(x=>x.id!==m.id));tt("Removido");}} style={{color:"#ef4444"}}><I.Trash/></Btn><div style={{color:"#444",transform:exp[m.id]?"rotate(0)":"rotate(-90deg)",transition:"transform .2s"}}><I.ChevDown/></div></div></div>
      {exp[m.id]&&<div style={{borderTop:"1px solid #161616",padding:"8px 14px 12px"}}>{m.lessons.map((l,li)=>(<div key={l.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 10px",background:"#111",borderRadius:8,marginBottom:3}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#333",fontSize:12,fontWeight:600,width:18}}>{li+1}</span><span style={{color:"#555"}}>{l.type==="video"?<I.Video/>:l.type==="link"?<I.Link/>:<I.File/>}</span><span style={{color:"#ccc",fontSize:13,fontWeight:500}}>{l.title}</span>{(l.attachments||[]).length>0&&<span style={{color:"#555"}}><I.Paperclip/></span>}</div>
        <div style={{display:"flex",gap:2}}><Btn variant="ghost" size="sm" onClick={()=>openLessonEdit(m.id,l)}><I.Edit/></Btn><Btn variant="ghost" size="sm" onClick={()=>{onSave(mods.map(x=>x.id===m.id?{...x,lessons:x.lessons.filter(y=>y.id!==l.id)}:x));tt("Removida");}} style={{color:"#ef4444"}}><I.Trash/></Btn></div>
      </div>))}<Btn variant="secondary" size="sm" onClick={()=>openLessonNew(m.id)} style={{marginTop:5}}><I.Plus/>Aula</Btn></div>}
    </div>))}</div>}
    {smm&&<Modal title={em?"Editar Módulo":"Novo Módulo"} onClose={()=>sSmm(false)}><Input label="Nome" value={mf.title} onChange={e=>sMf({...mf,title:e.target.value})} placeholder="Ex: Fundamentos"/><Textarea label="Descrição" value={mf.description} onChange={e=>sMf({...mf,description:e.target.value})}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><Btn variant="secondary" onClick={()=>sSmm(false)}>Cancelar</Btn><Btn onClick={savM}>{em?"Salvar":"Criar"}</Btn></div></Modal>}
    {slm&&<Modal title={el?"Editar Aula":"Nova Aula"} onClose={()=>sSlm(false)}><Input label="Título" value={lf.title} onChange={e=>sLf({...lf,title:e.target.value})}/><Select label="Tipo" value={lf.type} onChange={e=>sLf({...lf,type:e.target.value})} options={[{value:"video",label:"Vídeo"},{value:"link",label:"Link"},{value:"file",label:"Arquivo"}]}/><Input label="URL" value={lf.url} onChange={e=>sLf({...lf,url:e.target.value})} placeholder="https://..."/><Textarea label="Descrição" value={lf.description} onChange={e=>sLf({...lf,description:e.target.value})}/><AttEdit atts={lf.attachments||[]} onChange={a=>sLf({...lf,attachments:a})}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><Btn variant="secondary" onClick={()=>sSlm(false)}>Cancelar</Btn><Btn onClick={savL}>{el?"Salvar":"Adicionar"}</Btn></div></Modal>}
  </div>);

  const sorted=[...evts].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const getStName=(sid)=>{const s=sts.find(x=>x.id===sid);return s?s.name:"Aluno removido";};
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:10}}><div><h1 style={{color:"#fff",fontSize:24,fontWeight:700,margin:0}}>Eventos</h1><p style={{color:"#555",fontSize:14,margin:"2px 0 0"}}>{evts.length} evento(s)</p></div><Btn onClick={()=>{sF({title:"",date:"",time:"",description:"",studentId:sts.length>0?sts[0].id:""});sEId(null);sSh(true);}}><I.Plus/>Novo</Btn></div>
    {evts.length===0?<Empty icon={<I.Calendar/>} text="Nenhum evento"/>:<div style={{display:"grid",gap:7}}>{sorted.map(ev=>(<div key={ev.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:12,gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:46,height:46,borderRadius:11,background:"#1a1a1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{color:"#fff",fontSize:16,fontWeight:700,lineHeight:1}}>{ev.date?ev.date.split("-")[2]:"--"}</div><div style={{color:"#666",fontSize:10}}>{ev.date?months[parseInt(ev.date.split("-")[1])-1]:""}</div></div><div><div style={{color:"#fff",fontWeight:600,fontSize:14}}>{ev.title}</div><div style={{color:"#555",fontSize:12,display:"flex",alignItems:"center",gap:4,marginTop:2}}><I.Clock/>{ev.time}</div><div style={{color:"#444",fontSize:11,marginTop:2}}>Aluno: {getStName(ev.studentId)}</div></div></div>
      <div style={{display:"flex",gap:3,flexShrink:0}}><Btn variant="ghost" size="sm" onClick={()=>{sF({title:ev.title,date:ev.date,time:ev.time,description:ev.description||"",studentId:ev.studentId||""});sEId(ev.id);sSh(true);}}><I.Edit/></Btn><Btn variant="ghost" size="sm" onClick={()=>{onSave(evts.filter(x=>x.id!==ev.id));tt("Removido");}} style={{color:"#ef4444"}}><I.Trash/></Btn></div>
    </div>))}</div>}
    {sh&&<Modal title={eId?"Editar Evento":"Novo Evento"} onClose={()=>sSh(false)}>
      <Input label="Título" value={f.title} onChange={e=>sF({...f,title:e.target.value})} placeholder="Ex: Aula ao vivo #3"/>
      <Select label="Aluno" value={f.studentId} onChange={e=>sF({...f,studentId:e.target.value})} options={sts.map(s=>({value:s.id,label:s.name+" ("+s.email+")"}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Input label="Data" type="date" value={f.date} onChange={e=>sF({...f,date:e.target.value})}/><Input label="Horário" type="time" value={f.time} onChange={e=>sF({...f,time:e.target.value})}/></div>
      <Textarea label="Descrição (opcional)" value={f.description} onChange={e=>sF({...f,description:e.target.value})}/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><Btn variant="secondary" onClick={()=>sSh(false)}>Cancelar</Btn><Btn onClick={save}>{eId?"Salvar":"Criar"}</Btn></div>
    </Modal>}
  </div>);
}

/* Admin Progress */
function AProg({sts,mods,prog}){return(<div><h1 style={{color:"#fff",fontSize:24,fontWeight:700,margin:"0 0 6px"}}>Progresso</h1><p style={{color:"#555",fontSize:14,margin:"0 0 22px"}}>Acompanhe seus alunos</p>{sts.length===0?<Empty icon={<I.Users/>} text="Cadastre alunos"/>:<div style={{display:"grid",gap:9}}>{sts.map(s=>{const as2=mods.filter(m=>(s.assignedModules||[]).includes(m.id));const tl2=as2.reduce((a,m)=>a+m.lessons.length,0);const sp=prog[s.id]||{};const dn2=Object.values(sp).filter(Boolean).length;const pc2=tl2>0?Math.round((dn2/tl2)*100):0;return(<div key={s.id} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,padding:"16px 14px"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><Av name={s.name} size={36}/><div><div style={{color:"#fff",fontWeight:600,fontSize:14}}>{s.name}</div><div style={{color:"#555",fontSize:11}}>{s.email}</div></div></div><div style={{color:"#fff",fontSize:20,fontWeight:700}}>{pc2}%</div></div><div style={{background:"#1a1a1a",borderRadius:6,height:5,overflow:"hidden"}}><div style={{width:`${pc2}%`,height:"100%",background:"#fff",borderRadius:6}}/></div><div style={{color:"#555",fontSize:11,marginTop:5}}>{dn2}/{tl2} aula(s)</div></div>);})}</div>}</div>);}

/* ═══ STUDENT PORTAL ═══ */
function StudentPortal({user,onLogout}){const mob=useIsMobile();const[tab,sTab]=useState("inicio");const[mods,sMods]=useState([]);const[prog,sProg]=useState({});const[evts,sEvts]=useState([]);const[ok,sOk]=useState(false);
  useEffect(()=>{const am=ld(SK.MODULES,[]);const ap=ld(SK.PROGRESS,{});const ae=ld(SK.EVENTS,[]);sMods(am.filter(m=>(user.assignedModules||[]).includes(m.id)));sProg(ap[user.id]||{});
    /* TASK 2 FIX: filter events by studentId */
    sEvts(ae.filter(e=>e.studentId===user.id));
    sOk(true);},[user]);
  const mark=lid=>{const np={...prog,[lid]:!prog[lid]};sProg(np);const all=ld(SK.PROGRESS,{});all[user.id]=np;sv(SK.PROGRESS,all);};
  const tl=mods.reduce((a,m)=>a+m.lessons.length,0);const dn=Object.values(prog).filter(Boolean).length;const pc=tl>0?Math.round((dn/tl)*100):0;
  const nav=[{id:"inicio",l:"Início",Ic:I.Home},{id:"eventos",l:"Eventos",Ic:I.Calendar},{id:"perfil",l:"Perfil",Ic:I.User}];
  if(!ok)return<div style={{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#fff"}}>Carregando...</div></div>;
  return(<div style={{minHeight:"100vh",background:"#000",display:"flex"}}>
    {!mob&&<aside style={{width:210,background:"#080808",borderRight:"1px solid #161616",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh"}}>
      <div style={{padding:"18px 14px",display:"flex",alignItems:"center",gap:10}}><Logo size={28}/><div><div style={{color:"#fff",fontWeight:700,fontSize:14}}>Mentoria MVP</div><div style={{color:"#444",fontSize:10}}>Área do Aluno</div></div></div>
      <div style={{padding:"0 14px 14px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{color:"#888",fontSize:11}}>Progresso</span><span style={{color:"#fff",fontSize:12,fontWeight:700}}>{pc}%</span></div><div style={{background:"#1a1a1a",borderRadius:6,height:4,overflow:"hidden"}}><div style={{width:`${pc}%`,height:"100%",background:"#fff",borderRadius:6}}/></div></div>
      <nav style={{flex:1,padding:"0 8px"}}>{nav.map(n=>(<button key={n.id} onClick={()=>sTab(n.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"10px 12px",border:"none",borderRadius:10,marginBottom:2,background:tab===n.id?"#1a1a1a":"transparent",color:tab===n.id?"#fff":"#666",cursor:"pointer",fontSize:13,fontWeight:500,textAlign:"left"}}><n.Ic/>{n.l}</button>))}</nav>
      <div style={{padding:"12px 8px",borderTop:"1px solid #161616"}}><div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",marginBottom:4}}><Av name={user.name} size={28}/><div><div style={{color:"#fff",fontSize:12,fontWeight:500}}>{user.name}</div><div style={{color:"#555",fontSize:10}}>{user.email}</div></div></div><button onClick={onLogout} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",border:"none",borderRadius:10,background:"transparent",color:"#ef4444",cursor:"pointer",fontSize:13,fontWeight:500}}><I.Logout/>Sair</button></div>
    </aside>}
    <main style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",paddingBottom:mob?68:0}}>
      {tab==="inicio"&&<SInicio mods={mods} prog={prog} mark={mark} pc={pc} dn={dn} tl={tl} user={user} mob={mob}/>}
      {tab==="eventos"&&<SEventos evts={evts} mob={mob}/>}
      {tab==="perfil"&&<SPerfil user={user} onLogout={onLogout} pc={pc} dn={dn} tl={tl} mob={mob}/>}
    </main>
    {mob&&<nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#080808",borderTop:"1px solid #161616",display:"flex",justifyContent:"space-around",padding:"7px 0",paddingBottom:"calc(7px + env(safe-area-inset-bottom))",zIndex:800}}>{nav.map(n=>(<button key={n.id} onClick={()=>sTab(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:tab===n.id?"#fff":"#555",padding:"5px 14px"}}><n.Ic s={22}/><span style={{fontSize:10,fontWeight:600}}>{n.l}</span></button>))}</nav>}
  </div>);
}

/* Student Início */
function SInicio({mods,prog,mark,pc,dn,tl,user,mob}){const[al,sAl]=useState(null);const[amid,sAmid]=useState(null);const[exp,sExp]=useState(()=>{const e={};mods.forEach(m=>e[m.id]=true);return e;});
  if(al){const vi=al.type==="video"&&al.url?pvUrl(al.url):null;const md=mods.find(m=>m.id===amid);return(<div style={{flex:1,overflowY:"auto",animation:"fadeIn .2s ease"}}><div style={{padding:mob?"11px 13px":"14px 26px",borderBottom:"1px solid #161616"}}><button onClick={()=>sAl(null)} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:13,fontWeight:500,padding:3}}><I.ChevLeft/>Voltar</button></div>{vi&&<VidPlayer info={vi} url={al.url}/>}{al.type==="link"&&al.url&&<div style={{padding:mob?"22px 14px":"28px",background:"#080808",borderBottom:"1px solid #161616",textAlign:"center"}}><a href={al.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"13px 24px",background:"#1a1a1a",border:"1px solid #333",borderRadius:12,color:"#fff",textDecoration:"none",fontSize:14,fontWeight:600}}><I.Link/>Abrir conteúdo</a></div>}{al.type==="file"&&al.url&&<div style={{padding:mob?"22px 14px":"28px",background:"#080808",borderBottom:"1px solid #161616",textAlign:"center"}}><a href={al.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"13px 24px",background:"#1a1a1a",border:"1px solid #333",borderRadius:12,color:"#fff",textDecoration:"none",fontSize:14,fontWeight:600}}><I.File/>Baixar arquivo</a></div>}<div style={{padding:mob?"18px 14px":"26px 32px"}}>{md&&<div style={{color:"#555",fontSize:12,fontWeight:500,marginBottom:5}}>{md.title}</div>}<h1 style={{color:"#fff",fontSize:mob?19:23,fontWeight:700,margin:"0 0 10px"}}>{al.title}</h1>{al.description&&<p style={{color:"#888",fontSize:14,lineHeight:1.6,maxWidth:700}}>{al.description}</p>}<AttShow atts={al.attachments}/><div style={{marginTop:18}}><Btn variant={prog[al.id]?"secondary":"primary"} onClick={()=>mark(al.id)}>{prog[al.id]?<><I.Check/>Concluída</>:"Marcar como concluída"}</Btn></div></div></div>);}
  return(<div style={{flex:1,overflowY:"auto"}}><div style={{padding:mob?"18px 14px":"26px 32px",borderBottom:"1px solid #111"}}><h1 style={{color:"#fff",fontSize:mob?19:23,fontWeight:700,margin:"0 0 3px"}}>Olá, {user.name}</h1><p style={{color:"#555",fontSize:13,margin:"0 0 14px"}}>Continue de onde parou</p><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><span style={{color:"#888",fontSize:12}}>Progresso</span><span style={{color:"#fff",fontSize:13,fontWeight:700}}>{pc}%</span></div><div style={{background:"#1a1a1a",borderRadius:6,height:5,overflow:"hidden"}}><div style={{width:`${pc}%`,height:"100%",background:"#fff",borderRadius:6}}/></div><div style={{color:"#444",fontSize:11,marginTop:4}}>{dn}/{tl} aulas</div></div><div style={{padding:mob?"14px":"18px 32px"}}>{mods.length===0?<Empty icon={<I.Book/>} text="Nenhum módulo atribuído"/>:<div style={{display:"grid",gap:9}}>{mods.map((m,mi)=>{const md2=m.lessons.filter(l=>prog[l.id]).length;const mp2=m.lessons.length>0?Math.round((md2/m.lessons.length)*100):0;return(<div key={m.id} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,overflow:"hidden"}}><button onClick={()=>sExp(p=>({...p,[m.id]:!p[m.id]}))} style={{display:"flex",alignItems:"center",gap:11,width:"100%",padding:"13px 14px",border:"none",background:"transparent",cursor:"pointer",textAlign:"left"}}><div style={{width:34,height:34,borderRadius:10,background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:14,flexShrink:0}}>{mi+1}</div><div style={{flex:1,minWidth:0}}><div style={{color:"#fff",fontWeight:600,fontSize:14}}>{m.title}</div><div style={{color:"#555",fontSize:11,marginTop:1}}>{md2}/{m.lessons.length} · {mp2}%</div></div><div style={{color:"#444",transform:exp[m.id]?"rotate(0)":"rotate(-90deg)",transition:"transform .2s"}}><I.ChevDown/></div></button>{exp[m.id]&&<div style={{borderTop:"1px solid #161616",padding:"7px 10px 10px"}}>{m.lessons.map(l=>{const done=prog[l.id];return(<button key={l.id} onClick={()=>{sAl(l);sAmid(m.id);}} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"10px 11px",border:"none",borderRadius:10,marginBottom:2,background:"transparent",cursor:"pointer",textAlign:"left"}}><div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:done?"none":"2px solid #333",background:done?"#fff":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{done&&<span style={{color:"#000"}}><I.Check s={12}/></span>}</div><span style={{color:done?"#666":"#ccc",fontSize:13,fontWeight:500,textDecoration:done?"line-through":"none",flex:1}}>{l.title}</span><span style={{color:"#333"}}>{l.type==="video"?<I.Video/>:l.type==="link"?<I.Link/>:<I.File/>}</span></button>);})}</div>}</div>);})}</div>}</div></div>);
}

/* Student Eventos */
function SEventos({evts,mob}){const sorted=[...evts].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));const now=new Date().toISOString().split("T")[0];const up=sorted.filter(e=>e.date>=now);const past=sorted.filter(e=>e.date<now);
  return(<div style={{flex:1,overflowY:"auto",padding:mob?"18px 14px":"26px 32px"}}><h1 style={{color:"#fff",fontSize:mob?19:23,fontWeight:700,margin:"0 0 3px"}}>Eventos</h1><p style={{color:"#555",fontSize:13,margin:"0 0 20px"}}>Seus eventos e encontros</p>{evts.length===0?<Empty icon={<I.Calendar/>} text="Nenhum evento agendado para você"/>:<div>{up.length>0&&<><h3 style={{color:"#888",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Próximos</h3><div style={{display:"grid",gap:7,marginBottom:24}}>{up.map(ev=><EvCard key={ev.id} ev={ev}/>)}</div></>}{past.length>0&&<><h3 style={{color:"#888",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Anteriores</h3><div style={{display:"grid",gap:7,opacity:.6}}>{past.map(ev=><EvCard key={ev.id} ev={ev}/>)}</div></>}</div>}</div>);
}
function EvCard({ev}){const d=ev.date?ev.date.split("-")[2]:"--";const m=ev.date?months[parseInt(ev.date.split("-")[1])-1]:"";return(<div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14}}><div style={{width:48,height:48,borderRadius:11,background:"#1a1a1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{color:"#fff",fontSize:17,fontWeight:700,lineHeight:1}}>{d}</div><div style={{color:"#666",fontSize:10}}>{m}</div></div><div style={{flex:1,minWidth:0}}><div style={{color:"#fff",fontWeight:600,fontSize:15,marginBottom:3}}>{ev.title}</div><div style={{color:"#888",fontSize:12,display:"flex",alignItems:"center",gap:4}}><I.Clock/>{ev.time} · {fmtDate(ev.date)}</div>{ev.description&&<div style={{color:"#555",fontSize:13,marginTop:5,lineHeight:1.5}}>{ev.description}</div>}</div></div>);}

/* ═══ Student Perfil (TASK 5 FIX: proper alignment) ═══ */
function SPerfil({user,onLogout,pc,dn,tl,mob}){return(<div style={{flex:1,overflowY:"auto",padding:mob?"18px 14px":"26px 32px",display:"flex",flexDirection:"column",alignItems:"center"}}>
  <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:mob?20:40,marginBottom:28}}>
    <Av name={user.name} size={80}/>
    <h2 style={{color:"#fff",fontSize:21,fontWeight:700,marginTop:16,marginBottom:4,textAlign:"center"}}>{user.name}</h2>
    <p style={{color:"#555",fontSize:14,textAlign:"center"}}>{user.email}</p>
  </div>
  <div style={{width:"100%",maxWidth:380}}>
    <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,padding:"18px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{color:"#888",fontSize:13}}>Progresso</span><span style={{color:"#fff",fontSize:14,fontWeight:700}}>{pc}%</span></div>
      <div style={{background:"#1a1a1a",borderRadius:6,height:6,overflow:"hidden"}}><div style={{width:`${pc}%`,height:"100%",background:"#fff",borderRadius:6}}/></div>
      <div style={{color:"#555",fontSize:12,marginTop:7}}>{dn} de {tl} aula(s)</div>
    </div>
    <button onClick={onLogout} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:9,width:"100%",padding:"13px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:14,color:"#ef4444",cursor:"pointer",fontSize:15,fontWeight:600,marginTop:6}}><I.Logout/>Sair da conta</button>
  </div>
</div>);}

/* ═══ APP ═══ */
function App(){const[u,sU]=useState(null);return(<React.Fragment>{!u&&<LoginPage onLogin={sU}/>}{u?.role==="admin"&&<AdminDash user={u} onLogout={()=>sU(null)}/>}{u?.role==="student"&&<StudentPortal user={u} onLogout={()=>sU(null)}/>}</React.Fragment>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
