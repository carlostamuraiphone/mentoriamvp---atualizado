let _cache = {};
async function loadAll(){
  try{
    const {data} = await SUPA.from("app_data").select("key,value");
    if(data) data.forEach(r => { _cache[r.key] = r.value; });
  }catch(e){ console.warn("loadAll error:", e); }

function ld(k,fb){ return _cache[k] !== undefined ? _cache[k] : fb; }
function sv(k,d,onErr){
  _cache[k]=d;
  SUPA.from("app_data").upsert({key:k,value:d})
    .then(({error})=>{ if(error&&onErr)onErr(error.message); else if(error)console.error("sv:",error); })

}

/* ── SESSION ── */
const SESS_COOKIE="mvp_tok", SESS_TTL_DAYS=30;
function _setCk(n,v,d){const e=new Date();e.setDate(e.getDate()+d);document.cookie=n+"="+encodeURIComponent(v)+";expires="+e.toUTCString()+";path=/;SameSite=Lax";}
function _getCk(n){const m=document.cookie.match(new RegExp("(?:^|; )"+n+"=([^;]*)"));return m?decodeURIComponent(m[1]):null;}
function _delCk(n){document.cookie=n+"=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";}
async function createSession(user){
  const token="sess_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
  const sess={token,email:user.email,role:user.role,name:user.name,expiresAt:new Date(Date.now()+SESS_TTL_DAYS*86400000).toISOString()};
  sv("session_"+token,sess);
  _setCk(SESS_COOKIE,token,SESS_TTL_DAYS);
}
function restoreSession(){
  const token=_getCk(SESS_COOKIE);if(!token)return null;
  const sess=ld("session_"+token,null);if(!sess)return null;
  if(new Date(sess.expiresAt)<new Date()){_delCk(SESS_COOKIE);return null;}
  return sess;
}
async function destroySession(){
  const token=_getCk(SESS_COOKIE);_delCk(SESS_COOKIE);
  if(token) await SUPA.from("app_data").delete().eq("key","session_"+token);
}

/* ── ERROR BOUNDARY ── */
class ErrorBoundary extends Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(error){ return {hasError:true,error}; }
  componentDidCatch(error,info){ console.error("ErrorBoundary caught:", error, info); }
  render(){
    if(this.state.hasError){
      return(
        <div style={{minHeight:"100vh",background:"#fcf8f8",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
          <div style={{maxWidth:"480px",width:"100%",background:"white",borderRadius:"12px",padding:"2.5rem",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
            <div style={{width:"48px",height:"48px",background:"#ba1a1a",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"1.5rem"}}>
              <span className="material-symbols-outlined" style={{color:"white"}}>error</span>
            </div>
            <h2 style={{fontFamily:"Inter",fontWeight:900,fontSize:"1.25rem",marginBottom:"0.5rem"}}>Erro ao carregar</h2>
            <p style={{fontFamily:"Manrope",fontSize:"0.875rem",color:"#777",marginBottom:"1.5rem"}}>
              Ocorreu um erro inesperado. Recarregue a página.
            </p>
            <p style={{fontFamily:"monospace",fontSize:"0.75rem",background:"#f6f3f2",padding:"1rem",borderRadius:"8px",wordBreak:"break-all",color:"#474747"}}>
              {this.state.error ? String(this.state.error) : "Erro desconhecido"}
            </p>
            <button onClick={()=>window.location.reload()}
              style={{marginTop:"1.5rem",width:"100%",background:"black",color:"white",border:"none",borderRadius:"8px",padding:"0.875rem",fontFamily:"Manrope",fontWeight:700,fontSize:"0.75rem",letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>
              Recarregar Página
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function Toast({msg, onDone}){

  return(

      <span className="material-symbols-outlined" style={{fontVariationSettings:"'FILL' 1,wght 300,GRAD 0,opsz 24"}}>check_circle</span>
      {msg}

}

/* ── LOGIN PAGE ── */
function LoginPage({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const go=()=>{
    setErr("");
    const te=email.trim().toLowerCase(), tp=pass.trim();
    if(!te||!tp){setErr("Preencha todos os campos");return;}
    setLoading(true);
    try{
      const adm=ld(SK.ADMIN,DEFAULT_ADMIN);
      if(te===adm.email.toLowerCase()&&tp===adm.password){
        setLoading(false);onLogin({role:"admin",email:adm.email,name:"Admin"});return;
      }
      const sts=arr(ld(SK.STUDENTS,[]));
      const st=sts.find(function(s){return s.email&&s.email.trim().toLowerCase()===te&&s.password===tp;});
      if(st){setLoading(false);onLogin(Object.assign({role:"student"},st));return;}
      setLoading(false);setErr("E-mail ou senha incorretos");
    }catch(e){setLoading(false);setErr("Erro ao verificar credenciais");}
  };
  return(
    <div className="min-h-screen bg-[#fcf8f8] flex items-center justify-center p-4">
      <div className="w-full max-w-md fade-in">
        <div className="text-center mb-12">
          <div className="inline-flex w-16 h-16 bg-black rounded-xl items-center justify-center mb-6 shadow-xl">
            <span className="material-symbols-outlined text-white text-3xl">school</span>
          </div>

          <p className="text-zinc-400 text-sm font-body mt-2">Acesse sua conta para continuar</p>
        </div>
        <div className="bg-white rounded-xl p-6 md:p-10 shadow-sm border border-zinc-100">
          <div className="space-y-6">
            <div>
              <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">E-mail</label>
              <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")go();}}
                placeholder="seu@email.com"
                className="w-full bg-[#f6f3f2] border-none rounded-xl px-4 py-4 text-sm font-body tracking-wide outline-none"/>
            </div>
            <div>
              <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">Senha</label>
              <input type="password" value={pass} onChange={function(e){setPass(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")go();}}
                placeholder="••••••••"
                className="w-full bg-[#f6f3f2] border-none rounded-xl px-4 py-4 text-sm font-body tracking-wide outline-none"/>
            </div>
            {err && <p className="text-[#ba1a1a] text-xs font-bold">{err}</p>}
            <button onClick={go} disabled={loading}
              className="w-full bg-black text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl hover:bg-zinc-800 transition-all active:scale-[0.98] disabled:opacity-50">
              {loading ? "Entrando..." : "Entrar"}
            </button>
          </div>
        </div>
        <p className="text-center text-xs text-zinc-400 mt-6 font-body">
          Problema de acesso?{" "}
          <button className="text-black font-bold underline"
            onClick={function(){alert("Contato: suporte@mentoriamvp.com");}}>

    </div>
  );
}

/* ── EMBED URL HELPER ── */
function toEmbedUrl(url){
  if(!url) return null;
  // YouTube watch: https://www.youtube.com/watch?v=ID
  var m = url.match(/(?:youtube\.com\/watch\?(?:.*&)?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m) return "https://www.youtube.com/embed/"+m[1]+"?autoplay=1&rel=0";
  // YouTube embed já formatado
  if(url.indexOf("youtube.com/embed/")!==-1) return url;
  // Vimeo: https://vimeo.com/ID
  var v = url.match(/vimeo\.com\/(\d+)/);
  if(v) return "https://player.vimeo.com/video/"+v[1]+"?autoplay=1";
  // Qualquer outro link — tenta embed direto
  return url;
}

                return(
                  <div key={i} className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="w-10 h-10 bg-black text-white rounded-lg flex items-center justify-center">
                        <span className="material-symbols-outlined text-sm">{s.icon}</span>
                      </div>
                      <span className="text-xs font-bold text-zinc-400 uppercase tracking-widest">{s.label}</span>
                    </div>
                    <div className="text-4xl font-headline font-black">{s.value}</div>
                    <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mt-2">{s.sub}</p>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="sts" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Alunos</h2>
            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Aluno</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <input className={inp} placeholder="Nome" value={newSt.name} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{name:e.target.value});});}}/>
                <input className={inp} placeholder="E-mail" type="email" value={newSt.email} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{email:e.target.value});});}}/>
                <input className={inp} placeholder="Senha" type="password" value={newSt.password} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{password:e.target.value});});}}/>
                <button onClick={addSt} className={btnAdd}>Adicionar</button>
              </div>
            </div>
            <div className="space-y-3">
              {sts.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum aluno cadastrado.</p>}
              {sts.map(function(st){
                return(
                  <div key={st.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center"><span className="material-symbols-outlined text-zinc-400 text-sm">person</span></div>
                      <div><p className="text-sm font-black text-black">{st.name||"Sem nome"}</p><p className="text-xs text-zinc-400 font-bold">{st.email}</p></div>
                    </div>
                    <button onClick={function(){delSt(st.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="mods" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Módulos</h2>
            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Módulo</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input className={inp} placeholder="Título" value={newMod.title} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{title:e.target.value});});}}/>
                <input className={inp} placeholder="Descrição" value={newMod.desc} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{desc:e.target.value});});}}/>
                <input className={inp} placeholder="Nº de Aulas" type="number" value={newMod.lessons} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{lessons:parseInt(e.target.value)||8});});}}/>
                <input className={inp} placeholder="Duração (ex: 3h)" value={newMod.duration} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{duration:e.target.value});});}}/>
                <input className={inp+" md:col-span-2"} placeholder="Link da aula (URL — ex: https://youtu.be/...)" type="url" value={newMod.link} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{link:e.target.value});});}}/>
              </div>
              <button onClick={addMod} className={btnAdd}>Adicionar Módulo</button>
            </div>
            <div className="space-y-3">
              {mods.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum módulo cadastrado.</p>}
              {mods.map(function(mod,idx){
                return(
                  <div key={mod.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-black text-white rounded-lg flex items-center justify-center text-xs font-black">{String(idx+1).padStart(2,"0")}</div>
                      <div><p className="text-sm font-black text-black">{mod.title}</p><p className="text-xs text-zinc-400 font-bold">{mod.lessons+" aulas · "+mod.duration}</p>{mod.link&&<p className="text-xs text-zinc-300 truncate max-w-sm">{mod.link}</p>}</div>
                    </div>
                    <button onClick={function(){delMod(mod.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="evts" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Eventos</h2>
            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Evento</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input className={inp} placeholder="Título" value={newEvt.title} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{title:e.target.value});});}}/>
                <input className={inp} placeholder="Data (ex: 15 de Outubro, 19:00)" value={newEvt.date} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{date:e.target.value});});}}/>
                <input className={inp} placeholder="Tipo (Workshop, Mentoria...)" value={newEvt.etype} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{etype:e.target.value});});}}/>
                <input className={inp} placeholder="Nome do Mentor" value={newEvt.mentor} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{mentor:e.target.value});});}}/>
              </div>
              <button onClick={addEvt} className={btnAdd}>Adicionar Evento</button>
            </div>
            <div className="space-y-3">
              {evts.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum evento cadastrado.</p>}
              {evts.map(function(evt){
                return(
                  <div key={evt.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-black rounded-lg flex items-center justify-center"><span className="material-symbols-outlined text-white text-sm">event</span></div>
                      <div><p className="text-sm font-black text-black">{evt.title}</p><p className="text-xs text-zinc-400 font-bold">{(evt.etype||evt.type||"")+" · "+evt.date+" · "+evt.mentor}</p></div>
                    </div>
                    <button onClick={function(){delEvt(evt.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="prog" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Relatórios</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Progresso dos Alunos</h2>
            {sts.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum aluno cadastrado.</p>}
            <div className="space-y-4">
              {sts.map(function(st){
                var sp=obj(prog[st.id]);
                var done=mods.filter(function(m){return (sp[m.id]||0)>=100;}).length;
                var pct=mods.length>0?Math.round(mods.reduce(function(a,m){return a+(sp[m.id]||0);},0)/mods.length):0;
                return(
                  <div key={st.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center"><span className="material-symbols-outlined text-zinc-400 text-sm">person</span></div>
                        <div><p className="text-sm font-black text-black">{st.name||st.email}</p><p className="text-xs text-zinc-400 font-bold">{done+"/"+mods.length+" módulos concluídos"}</p></div>
                      </div>
                      <span className="text-2xl font-black text-black">{pct+"%"}</span>
                    </div>
                    <div className="w-full h-1.5 bg-zinc-100 rounded-full overflow-hidden">
                      <div className="h-full bg-black transition-all" style={{width:pct+"%"}}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="mats" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Materiais de Apoio</h2>
            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Material</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input className={inp} placeholder="Nome do material" value={newMat.name} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{name:e.target.value});});}}/>
                <select className={inp} value={newMat.type} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{type:e.target.value});}); }}>
                  <option value="PDF">PDF</option>
                  <option value="XLSX">Planilha (XLSX)</option>
                  <option value="Link">Link Externo</option>
                  <option value="DOC">Documento (DOC)</option>
                  <option value="ZIP">Arquivo ZIP</option>
                </select>
                <input className={inp} placeholder="Tamanho (ex: 4.2 MB) — opcional" value={newMat.size} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{size:e.target.value});});}}/>
                <input className={inp} placeholder="Módulo de referência (ex: Aula 04)" value={newMat.ref} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{ref:e.target.value});});}}/>
                <input className={inp+" md:col-span-2"} placeholder="Link para download ou acesso (URL)" type="url" value={newMat.link} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{link:e.target.value});});}}/>
              </div>
              <button onClick={addMat} className={btnAdd}>Adicionar Material</button>
            </div>
            <div className="space-y-3">
              {mats.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum material cadastrado.</p>}
              {mats.map(function(mat){
                return(
                  <div key={mat.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-zinc-100 rounded-lg flex items-center justify-center">
                        <span className="material-symbols-outlined text-zinc-400 text-sm">{mat.icon||"description"}</span>
                      </div>
                      <div>
                        <p className="text-sm font-black text-black">{mat.name}</p>
                        <p className="text-xs text-zinc-400 font-bold">{mat.type+(mat.size?" · "+mat.size:"")+(mat.ref?" · Ref: "+mat.ref:"")}</p>
                        {mat.link && <p className="text-xs text-zinc-300 truncate max-w-sm mt-0.5">{mat.link}</p>}
                      </div>
                    </div>
                    <button onClick={function(){delMat(mat.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </main>
      {toastMsg && <Toast msg={toastMsg} onDone={dismissToast}/>}
    </div>
  );
}

/* ── STUDENT PORTAL ── */
function StudentPortal({user, onLogout}){
  const [tab,setTab]=useState("inicio");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [mods,setMods]=useState([]);
  const [prog,setProg]=useState({});
  const [evts,setEvts]=useState([]);
  const [mats,setMats]=useState([]);
  const [toastMsg,setToastMsg]=useState(null);
  const toast=function(msg){setToastMsg(msg);};
  const dismissToast=useCallback(function(){setToastMsg(null);},[]);
  var handleTab=function(id){setTab(id);setSidebarOpen(false);};
  useEffect(function(){
    try{
      var rawMods=ld(SK.MODULES,[]);
      setMods(Array.isArray(rawMods)?rawMods:[]);
      var rawProg=ld(SK.PROGRESS,{});
      var safeProg=(rawProg&&typeof rawProg==="object")?rawProg:{};
      var uid=user&&user.id;
      var userProg=(uid&&safeProg[uid]&&typeof safeProg[uid]==="object")?safeProg[uid]:safeProg;
      setProg(userProg||{});
      var rawEvts=ld(SK.EVENTS,[]);
      setEvts(Array.isArray(rawEvts)?rawEvts:[]);
      var rawMats=ld(SK.MATERIALS,[]);
      setMats(Array.isArray(rawMats)?rawMats:[]);
    }catch(e){console.error("StudentPortal useEffect error:",e);}
  },[]);
  var phs={inicio:"Buscar aulas, materiais...",modulos:"Buscar módulos...",eventos:"Buscar eventos...",materiais:"Buscar materiais...",perfil:"Pesquisar..."};
  var tabLabels={inicio:"Início",modulos:"Módulos",eventos:"Eventos",materiais:"Materiais",perfil:"Perfil"};
  var userName=(user&&(user.name||(user.email?user.email.split("@")[0]:"")))||"Aluno";
  return(
    <div className="min-h-screen bg-[#fcf8f8]">
      <Sidebar tab={tab} onTab={handleTab} onLogout={onLogout} role="student" open={sidebarOpen} onClose={function(){setSidebarOpen(false);}}/>
      <TopBar userName={userName} onProfile={function(){handleTab("perfil");}} placeholder={tabLabels[tab]||"Dashboard"} onMenu={function(){setSidebarOpen(true);}}/>
      {tab==="inicio" && <SInicio user={user} mods={mods} prog={prog} evts={evts} onTab={handleTab} toast={toast}/>}
      {tab==="modulos" && <SModulos mods={mods} prog={prog} toast={toast}/>}
      {tab==="eventos" && <SEventos evts={evts} toast={toast}/>}
      {tab==="materiais" && <SMateriais mats={mats} toast={toast}/>}
      {tab==="perfil" && <SPerfil user={user} onLogout={onLogout} toast={toast}/>}
      {/* Mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-100 z-40 flex">
        {[{id:"inicio",icon:"home"},{id:"modulos",icon:"view_module"},{id:"eventos",icon:"event"},{id:"materiais",icon:"description"},{id:"perfil",icon:"person"}].map(function(item){return(
          <button key={item.id} onClick={function(){handleTab(item.id);}}
            className={"flex-1 flex flex-col items-center justify-center py-3 gap-0.5 transition-colors " + (tab===item.id?"text-black":"text-zinc-400")}>
            <span className="material-symbols-outlined text-xl" style={{fontVariationSettings:tab===item.id?"'FILL' 1,wght 400,GRAD 0,opsz 24":"'FILL' 0,wght 300,GRAD 0,opsz 24"}}>{item.icon}</span>
            <span className="text-[9px] font-bold uppercase tracking-wide">{tabLabels[item.id]}</span>
          </button>
        );})}
      </nav>
      <button onClick={function(){toast("Chat com mentor em breve!");}}
        className="fixed bottom-20 md:bottom-8 right-4 md:right-8 w-12 h-12 md:w-14 md:h-14 bg-black rounded-full flex items-center justify-center shadow-2xl hover:bg-zinc-800 transition-all hover:scale-110 z-50">
        <span className="material-symbols-outlined text-white text-xl md:text-2xl">chat_bubble</span>
      </button>
      {toastMsg && <Toast msg={toastMsg} onDone={dismissToast}/>}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [u,sU]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(function(){
    loadAll().then(function(){
      try{
        var sess=restoreSession();
        if(sess){
          var adm=ld(SK.ADMIN,DEFAULT_ADMIN);
          if(sess.role==="admin"){
            if(sess.email===adm.email) sU(sess); else destroySession();
          } else if(sess.role==="student"){
            var sts=arr(ld(SK.STUDENTS,[]));
            var still=sts.find(function(s){return s.email===sess.email;});
            if(still) sU(Object.assign({role:"student"},still)); else destroySession();
          } else { destroySession(); }
        }
      }catch(e){console.error("restore session error:",e);}
      setLoading(false);
    }).catch(function(e){
      console.error("loadAll failed:",e);
      setLoading(false);
    });
  },[]);
  var login=function(user){sU(user);createSession(user);};
  var logout=function(){sU(null);destroySession();};
  if(loading) return(
    <div className="min-h-screen bg-[#fcf8f8] flex items-center justify-center">
      <div className="text-center">
        <div className="inline-flex w-16 h-16 bg-black rounded-xl items-center justify-center mb-6" style={{animation:"pulse 2s infinite"}}>
          <span className="material-symbols-outlined text-white text-3xl">school</span>
        </div>
        <p className="text-zinc-400 text-sm font-body">Carregando...</p>
      </div>
    </div>
  );
  return(
    React.createElement(React.Fragment, null,
      !u && React.createElement(LoginPage, {onLogin:login}),
      u && u.role==="admin" && React.createElement(AdminDash, {user:u, onLogout:logout}),
      u && u.role==="student" && React.createElement(StudentPortal, {user:u, onLogout:logout})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null,
    React.createElement(App, null)
  )
);
</script>
</body>
