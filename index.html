let _cache = {};
async function loadAll(){
  try{
    const {data} = await SUPA.from("app_data").select("key,value");
    if(data) data.forEach(r => { _cache[r.key] = r.value; });
  }catch(e){ console.warn("loadAll error:", e); }
}
function ld(k,fb){ return _cache[k] !== undefined ? _cache[k] : fb; }
function sv(k,d,onErr){
  _cache[k]=d;
  SUPA.from("app_data").upsert({key:k,value:d})
    .then(({error})=>{ if(error&&onErr)onErr(error.message); else if(error)console.error("sv:",error); })
    .catch(e=>{ if(onErr)onErr(e.message); else console.error(e); });
}

/* ── FILE UPLOAD (Supabase Storage — bucket: "mentoria") ── */
async function uploadToStorage(file, folder){
  var ext=file.name.split('.').pop().toLowerCase();
  var path=folder+'/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.'+ext;
  var res=await SUPA.storage.from('mentoria').upload(path,file,{upsert:true});
  if(res.error) throw new Error(res.error.message);
  return SUPA.storage.from('mentoria').getPublicUrl(path).data.publicUrl;
}

/* ── SESSION ── */
const SESS_COOKIE="mvp_tok", SESS_TTL_DAYS=30;
function _setCk(n,v,d){const e=new Date();e.setDate(e.getDate()+d);document.cookie=n+"="+encodeURIComponent(v)+";expires="+e.toUTCString()+";path=/;SameSite=Lax";}
function _getCk(n){const m=document.cookie.match(new RegExp("(?:^|; )"+n+"=([^;]*)"));return m?decodeURIComponent(m[1]):null;}
function _delCk(n){document.cookie=n+"=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";}
async function createSession(user){
  const token="sess_"+Math.random().toString(36).slice(2)+Date.now().toString(36);
  const sess={token,email:user.email,role:user.role,name:user.name,expiresAt:new Date(Date.now()+SESS_TTL_DAYS*86400000).toISOString()};
  sv("session_"+token,sess);
  _setCk(SESS_COOKIE,token,SESS_TTL_DAYS);
}
function restoreSession(){
  const token=_getCk(SESS_COOKIE);if(!token)return null;
  const sess=ld("session_"+token,null);if(!sess)return null;
  if(new Date(sess.expiresAt)<new Date()){_delCk(SESS_COOKIE);return null;}
  return sess;
}
async function destroySession(){
  const token=_getCk(SESS_COOKIE);_delCk(SESS_COOKIE);
  if(token) await SUPA.from("app_data").delete().eq("key","session_"+token);
}

/* ── ERROR BOUNDARY ── */
class ErrorBoundary extends Component {
  constructor(props){ super(props); this.state={hasError:false,error:null}; }
  static getDerivedStateFromError(error){ return {hasError:true,error}; }
  componentDidCatch(error,info){ console.error("ErrorBoundary caught:", error, info); }
  render(){
    if(this.state.hasError){
      return(
        <div style={{minHeight:"100vh",background:"#fcf8f8",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
          <div style={{maxWidth:"480px",width:"100%",background:"white",borderRadius:"12px",padding:"2.5rem",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
            <div style={{width:"48px",height:"48px",background:"#ba1a1a",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"1.5rem"}}>
              <span className="material-symbols-outlined" style={{color:"white"}}>error</span>
            </div>
            <h2 style={{fontFamily:"Inter",fontWeight:900,fontSize:"1.25rem",marginBottom:"0.5rem"}}>Erro ao carregar</h2>
            <p style={{fontFamily:"Manrope",fontSize:"0.875rem",color:"#777",marginBottom:"1.5rem"}}>
              Ocorreu um erro inesperado. Recarregue a página.
            </p>
            <p style={{fontFamily:"monospace",fontSize:"0.75rem",background:"#f6f3f2",padding:"1rem",borderRadius:"8px",wordBreak:"break-all",color:"#474747"}}>
              {this.state.error ? String(this.state.error) : "Erro desconhecido"}
            </p>
            <button onClick={()=>window.location.reload()}
              style={{marginTop:"1.5rem",width:"100%",background:"black",color:"white",border:"none",borderRadius:"8px",padding:"0.875rem",fontFamily:"Manrope",fontWeight:700,fontSize:"0.75rem",letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>
              Recarregar Página
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ── LOGIN PAGE ── */
function LoginPage({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPwd,setShowPwd]=useState(false);
  const go=()=>{
    setErr("");
    const te=email.trim().toLowerCase(), tp=pass.trim();
    if(!te||!tp){setErr("Preencha todos os campos");return;}
    setLoading(true);
    try{
      const adm=ld(SK.ADMIN,DEFAULT_ADMIN);
      if(te===adm.email.toLowerCase()&&tp===adm.password){
        setLoading(false);onLogin({role:"admin",email:adm.email,name:"Admin"});return;
      }
      const sts=arr(ld(SK.STUDENTS,[]));
      const st=sts.find(function(s){return s.email&&s.email.trim().toLowerCase()===te&&s.password===tp;});
      if(st){setLoading(false);onLogin(Object.assign({role:"student"},st));return;}
      setLoading(false);setErr("E-mail ou senha incorretos");
    }catch(e){setLoading(false);setErr("Erro ao verificar credenciais");}
  };
  return(
    <div className="min-h-screen bg-[#fcf8f8] flex items-center justify-center p-4">
      <div className="w-full max-w-md fade-in">
        <div className="text-center mb-12">

            <img src="https://nmmxjbojochvkhshyxvy.supabase.co/storage/v1/object/public/mentoria/MVP%20Mentoria%20logo%20whatsapp%20grupo%20(1).png" alt="Mentoria MVP" className="w-full h-full object-cover"/>
          </div>
          <h1 className="text-3xl font-headline font-black tracking-tighter text-black">Mentoria MVP</h1>
          <p className="text-zinc-400 text-sm font-body mt-2">Acesse sua conta para continuar</p>
        </div>
        <div className="bg-white rounded-xl p-6 md:p-10 shadow-sm border border-zinc-100">
          <div className="space-y-6">
            <div>
              <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">E-mail</label>
              <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")go();}}
                placeholder="seu@email.com"
                className="w-full bg-[#f6f3f2] border-none rounded-xl px-4 py-4 text-sm font-body tracking-wide outline-none"/>
            </div>
            <div>
              <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">Senha</label>
              <div className="relative">
                <input type={showPwd?"text":"password"} value={pass} onChange={function(e){setPass(e.target.value);}}

                  placeholder="••••••••"
                  className="w-full bg-[#f6f3f2] border-none rounded-xl px-4 py-4 pr-12 text-sm font-body tracking-wide outline-none"/>
                <button type="button" onClick={function(){setShowPwd(function(v){return !v;});}}
                  className="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-black transition-colors">
                  <span className="material-symbols-outlined text-lg">{showPwd?"visibility_off":"visibility"}</span>
                </button>
              </div>
            </div>
            {err && <p className="text-[#ba1a1a] text-xs font-bold">{err}</p>}

/* ── EMBED URL HELPER ── */
function toEmbedUrl(url){
  if(!url) return null;
  // YouTube watch: https://www.youtube.com/watch?v=ID
  var m = url.match(/(?:youtube\.com\/watch\?(?:.*&)?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m) return "https://www.youtube.com/embed/"+m[1]+"?autoplay=1&rel=0&enablejsapi=1";
  // YouTube embed já formatado
  if(url.indexOf("youtube.com/embed/")!==-1) return url;
  // Vimeo: https://vimeo.com/ID
  var v = url.match(/vimeo\.com\/(\d+)/);
  if(v) return "https://player.vimeo.com/video/"+v[1]+"?autoplay=1";
  // Qualquer outro link — tenta embed direto
  return url;
}

/* ── LESSON PLAYER (modal) ── */
function LessonPlayer({mod, onClose, onComplete}){
  var embedUrl = toEmbedUrl(mod.link);
  useEffect(function(){
    // Listen for YouTube postMessage: state 0 = video ended
    function handleMsg(e){
      try{
        var data = typeof e.data==="string" ? JSON.parse(e.data) : e.data;
        if(data && data.event==="onStateChange" && data.info===0){
          onComplete && onComplete(mod.id);
        }
      }catch(err){}
    }
    window.addEventListener("message", handleMsg);
    return function(){ window.removeEventListener("message", handleMsg); };
  },[mod.id]);
  return(
    <div className="fixed inset-0 z-[9999] flex flex-col" style={{background:"rgba(0,0,0,0.96)"}}>
      {/* Header */}

        <div className="w-full max-w-5xl rounded-xl overflow-hidden shadow-2xl bg-black"
          style={{aspectRatio:"16/9",maxHeight:"calc(100vh - 140px)"}}>
          {embedUrl
            ? <iframe src={embedUrl} title={mod.title} frameBorder="0" width="100%" height="100%"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

            : <div className="w-full h-full flex flex-col items-center justify-center text-zinc-500">

                </>}

      {/* Material */}

  const [newMod,setNewMod]=useState({title:"",desc:"",duration:"",link:"",coverImage:"",studentId:""});

  const [coverImgFile,setCoverImgFile]=useState(null);
  const [coverImgPreview,setCoverImgPreview]=useState("");

  const [modMatFile,setModMatFile]=useState(null);
  const [newEvt,setNewEvt]=useState({title:"",date:"",time:"",etype:"Evento",mentor:"",linkInscricao:""});

  const [uploading,setUploading]=useState(false);
  var addSt=function(){
    if(!newSt.email||!newSt.password){toast("Preencha e-mail e senha");return;}
    if(newSt.password.length<6){toast("A senha deve ter pelo menos 6 caracteres");return;}
    var u=sts.concat([Object.assign({},newSt,{id:Date.now().toString(),role:"student"})]);
    setSts(u);sv(SK.STUDENTS,u);setNewSt({name:"",email:"",password:"",supportLink:""});toast("Aluno adicionado!");
  };
  var delSt=function(id){
    if(!window.confirm("Tem certeza que deseja remover este aluno? Esta ação não pode ser desfeita."))return;
    var u=sts.filter(function(s){return s.id!==id;});setSts(u);sv(SK.STUDENTS,u);toast("Aluno removido");
  };
  var addMod=async function(){
    if(!newMod.title){toast("Digite o título da aula");return;}
    setUploading(true);
    try{
      var sid=modStudentView?modStudentView.id:"";
      var modData=Object.assign({},newMod,{id:Date.now().toString(),studentId:sid});
      if(coverImgFile){
        try{ modData.coverImage=await uploadToStorage(coverImgFile,"covers"); }
        catch(e){ toast("Erro ao enviar imagem: "+e.message+". Crie o bucket 'mentoria' no Supabase Storage → Settings → Storage."); setUploading(false); return; }
      }
      if(newModMat.name){
        var matEntry={name:newModMat.name,type:newModMat.type,link:newModMat.link,lessonId:modData.id,lessonTitle:modData.title};
        if(newModMat.type!=="Link"&&modMatFile){
          try{ matEntry.link=await uploadToStorage(modMatFile,"materials"); matEntry.fileName=modMatFile.name; }
          catch(e){ toast("Erro ao enviar material: "+e.message+". Crie o bucket 'mentoria' no Supabase Storage."); setUploading(false); return; }
        }
        if(matEntry.link){
          matEntry.id=Date.now().toString()+"m";
          matEntry.icon=matEntry.type==="Link"?"link":matEntry.type==="XLSX"?"table_chart":"description";
          modData.material=matEntry;
          var um=mats.concat([matEntry]); setMats(um); sv(SK.MATERIALS,um);
        }
      }
      var u=mods.concat([modData]);
      setMods(u); sv(SK.MODULES,u);
      setNewMod({title:"",desc:"",duration:"",link:"",coverImage:"",studentId:""});
      setNewModMat({name:"",type:"PDF",link:""}); setCoverImgFile(null); setCoverImgPreview(""); setModMatFile(null);
      toast("Aula adicionada!");
    }catch(e){ toast("Erro: "+e.message); }
    setUploading(false);
  };
  var delMod=function(id){
    if(!window.confirm("Tem certeza que deseja remover esta aula? Esta ação não pode ser desfeita."))return;
    var modToRemove=mods.find(function(m){return m.id===id;});
    var u=mods.filter(function(m){return m.id!==id;});
    setMods(u); sv(SK.MODULES,u);
    if(modToRemove&&modToRemove.material){
      var um=mats.filter(function(m){return m.lessonId!==id;});
      setMats(um); sv(SK.MATERIALS,um);
    }
    toast("Aula removida");
  };
  var addEvt=function(){
    if(!newEvt.title){toast("Digite o título do evento");return;}
    var u=evts.concat([Object.assign({},newEvt,{id:Date.now().toString()})]);
    setEvts(u);sv(SK.EVENTS,u);setNewEvt({title:"",date:"",time:"",etype:"Evento",mentor:"",linkInscricao:""});toast("Evento adicionado!");
  };
  var delEvt=function(id){
    if(!window.confirm("Tem certeza que deseja remover este evento?"))return;
    var u=evts.filter(function(e){return e.id!==id;});setEvts(u);sv(SK.EVENTS,u);toast("Evento removido");
  };
  var addMat=async function(){
    if(!newMat.name){toast("Digite o nome do material");return;}
    if(newMat.type!=="Link"&&!newMatFile){toast("Selecione um arquivo para enviar");return;}
    if(newMat.type==="Link"&&!newMat.link){toast("Cole o link do material");return;}
    setUploading(true);
    try{
      var icon=newMat.type==="Link"?"link":newMat.type==="XLSX"?"table_chart":"description";
      var matData=Object.assign({},newMat,{id:Date.now().toString(),icon:icon});
      if(newMat.type!=="Link"&&newMatFile){
        try{ matData.link=await uploadToStorage(newMatFile,"materials"); matData.fileName=newMatFile.name; }
        catch(e){ toast("Erro ao enviar arquivo: "+e.message+". Crie o bucket 'mentoria' no Supabase Storage."); setUploading(false); return; }
      }
      var u=mats.concat([matData]);
      setMats(u); sv(SK.MATERIALS,u);
      setNewMat({name:"",type:"PDF",link:""}); setNewMatFile(null);
      toast("Material adicionado!");
    }catch(e){ toast("Erro: "+e.message); }
    setUploading(false);
  };
  var delMat=function(id){
    if(!window.confirm("Tem certeza que deseja remover este material?"))return;
    var u=mats.filter(function(m){return m.id!==id;});setMats(u);sv(SK.MATERIALS,u);toast("Material removido");
  };

    <div className="min-h-screen bg-[#fcf8f8]">

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

                {icon:"group",label:"Alunos",value:sts.length,sub:"Cadastrados"},
                {icon:"play_circle",label:"Aulas",value:mods.length,sub:"Cadastradas"},
                {icon:"event",label:"Eventos",value:evts.length,sub:"Programados"},

                      <div className="w-10 h-10 bg-black text-white rounded-lg flex items-center justify-center">
                        <span className="material-symbols-outlined text-sm">{s.icon}</span>
                      </div>
                      <span className="text-xs font-bold text-zinc-400 uppercase tracking-widest">{s.label}</span>
                    </div>
                    <div className="text-4xl font-headline font-black">{s.value}</div>
                    <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mt-2">{s.sub}</p>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="sts" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>

            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Aluno</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-4">
                <input className={inp} placeholder="Nome" value={newSt.name} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{name:e.target.value});});}}/>
                <input className={inp} placeholder="E-mail" type="email" value={newSt.email} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{email:e.target.value});});}}/>
                <input className={inp} placeholder="Senha" type="password" value={newSt.password} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{password:e.target.value});});}}/>
                <input className={inp+" md:col-span-2"} placeholder="Link do grupo de suporte (WhatsApp, Telegram, Discord...)" type="url" value={newSt.supportLink||""} onChange={function(e){setNewSt(function(v){return Object.assign({},v,{supportLink:e.target.value});});}}/>

              </div>
            </div>
            <div className="space-y-3">

                        </button>

                    {isEditing && (

                          onKeyDown={function(e){if(e.key==="Enter")saveStLink(st.id,editStLink.val);if(e.key==="Escape")setEditStLink({id:null,val:""}); }}/>
                        <button onClick={function(){saveStLink(st.id,editStLink.val);}} className="px-4 py-2 bg-black text-white text-xs font-black rounded-xl hover:bg-zinc-800 transition-all flex-shrink-0">Salvar</button>
                        <button onClick={function(){setEditStLink({id:null,val:""}); }} className="p-2 text-zinc-400 hover:text-black transition-colors flex-shrink-0"><span className="material-symbols-outlined text-sm">close</span></button>
                      </div>
                    )}
                    {!isEditing && st.supportLink && (
                      <div className="mt-3 flex items-center gap-2 text-[11px] text-green-700 bg-green-50 rounded-lg px-3 py-2">
                        <span className="material-symbols-outlined text-sm">link</span>
                        <span className="truncate font-medium">{st.supportLink}</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="mods" && (

            {!modStudentView ? (
              <>
                <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-3">Aulas</h2>
                <p className="text-zinc-500 text-sm mb-8">Selecione um aluno para gerenciar as aulas dele.</p>
                {sts.length===0
                  ? <div className="text-center py-16 text-zinc-400 bg-white rounded-xl border border-zinc-100"><span className="material-symbols-outlined text-4xl mb-3 block">group</span><p className="text-sm font-bold">Nenhum aluno cadastrado ainda.</p><p className="text-xs mt-1">Vá para a aba Alunos e cadastre primeiro.</p></div>
                  : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {sts.map(function(st){
                        var stMods=mods.filter(function(m){return m.studentId===st.id;});
                        return(
                          <button key={st.id} onClick={function(){setModStudentView(st);}}
                            className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 hover:border-black hover:shadow-md transition-all text-left group">
                            <div className="flex items-center gap-4 mb-4">
                              <div className="w-12 h-12 bg-zinc-100 rounded-full flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                                <span className="material-symbols-outlined text-zinc-400 group-hover:text-white">person</span>
                              </div>
                              <div>
                                <p className="text-sm font-black text-black">{st.name||"Sem nome"}</p>
                                <p className="text-xs text-zinc-400 font-bold">{st.email}</p>
                              </div>
                            </div>
                            <div className="flex items-center justify-between">
                              <span className="text-xs text-zinc-400 font-bold">{stMods.length===0?"Nenhuma aula":stMods.length===1?"1 aula":stMods.length+" aulas"}</span>
                              <span className="text-[10px] font-black uppercase tracking-widest text-black flex items-center gap-1">Gerenciar<span className="material-symbols-outlined text-sm">arrow_forward</span></span>
                            </div>
                          </button>
                        );
                      })}
                    </div>
                }
              </>
            ) : (
              <>
                <div className="flex items-center gap-4 mb-6">
                  <button onClick={function(){setModStudentView(null);setNewMod({title:"",desc:"",lessons:8,duration:"3h",link:"",coverImage:"",locked:false,studentId:""}); }}
                    className="flex items-center gap-2 text-zinc-500 hover:text-black transition-colors text-sm font-bold">
                    <span className="material-symbols-outlined text-base">arrow_back</span>Todos os Alunos
                  </button>
                  <span className="text-zinc-300">|</span>
                  <div className="flex items-center gap-2">
                    <div className="w-7 h-7 bg-zinc-100 rounded-full flex items-center justify-center"><span className="material-symbols-outlined text-zinc-400 text-sm">person</span></div>
                    <h2 className="text-lg md:text-2xl font-headline font-black tracking-tighter text-black">{"Aulas de " + (modStudentView.name||modStudentView.email)}</h2>
                  </div>
                </div>
                <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
                  <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Aula</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input className={inp} placeholder="Título da aula" value={newMod.title} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{title:e.target.value});});}}/>
                    <input className={inp} placeholder="Descrição" value={newMod.desc} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{desc:e.target.value});});}}/>
                    <input className={inp} placeholder="Duração (ex: 1h30)" value={newMod.duration} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{duration:e.target.value});});}}/>
                    <input className={inp+" md:col-span-2"} placeholder="Link do vídeo (ex: https://youtu.be/...)" type="url" value={newMod.link} onChange={function(e){setNewMod(function(v){return Object.assign({},v,{link:e.target.value});});}}/>
                    {/* Cover image upload */}
                    <div className="md:col-span-2">
                      <p className="text-[10px] font-black uppercase tracking-widest text-zinc-400 mb-2">Imagem de Capa</p>

                        {coverImgPreview && (
                          <div className="relative flex-shrink-0">
                            <img src={coverImgPreview} className="w-16 h-16 rounded-xl object-cover border border-zinc-200" alt="preview"/>
                            <button type="button" onClick={function(){setCoverImgFile(null);setCoverImgPreview("");}} className="absolute -top-2 -right-2 w-5 h-5 bg-zinc-700 text-white rounded-full flex items-center justify-center hover:bg-[#ba1a1a] transition-colors">
                              <span className="material-symbols-outlined" style={{fontSize:"12px"}}>close</span>
                            </button>
                          </div>
                        )}

                          <span className="material-symbols-outlined text-zinc-400">image</span>
                          <span className="text-sm font-bold text-zinc-500 truncate">{coverImgFile ? coverImgFile.name : "Selecionar imagem de capa..."}</span>
                          <input type="file" accept="image/*" className="sr-only" onChange={function(e){
                            var file=e.target.files[0]; if(!file)return;
                            setCoverImgFile(file);
                            var reader=new FileReader(); reader.onload=function(ev){setCoverImgPreview(ev.target.result);}; reader.readAsDataURL(file);
                            e.target.value="";
                          }}/>
                        </label>
                      </div>
                    </div>
                    {/* Lesson material */}

                          <option value="Link">Link Externo</option>

                      <div key={mod.id} className="bg-white rounded-xl p-5 shadow-sm border border-zinc-100 flex items-center justify-between gap-4">

                        <button onClick={function(){delMod(mod.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors flex-shrink-0"><span className="material-symbols-outlined text-sm">delete</span></button>

                <input className={inp} placeholder="Horário (ex: 19:00 · Brasília)" value={newEvt.time||""} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{time:e.target.value});});}}/>
                <input className={inp} placeholder="Nome do Mentor" value={newEvt.mentor} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{mentor:e.target.value});});}}/>
                <input className={inp} placeholder="Link de inscrição ou acesso (URL)" type="url" value={newEvt.linkInscricao||""} onChange={function(e){setNewEvt(function(v){return Object.assign({},v,{linkInscricao:e.target.value});});}}/>
              </div>
              <button onClick={addEvt} className={btnAdd}>Adicionar Evento</button>
            </div>
            <div className="space-y-3">
              {evts.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum evento cadastrado.</p>}
              {evts.map(function(evt){
                return(
                  <div key={evt.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-black rounded-lg flex items-center justify-center"><span className="material-symbols-outlined text-white text-sm">event</span></div>
                      <div><p className="text-sm font-black text-black">{evt.title}</p><p className="text-xs text-zinc-400 font-bold">{(evt.etype||evt.type||"")+" · "+evt.date+(evt.time?" · "+evt.time:"")+(evt.mentor?" · "+evt.mentor:"")}</p></div>
                    </div>
                    <button onClick={function(){delEvt(evt.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="prog" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Relatórios</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Progresso dos Alunos</h2>
            {sts.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum aluno cadastrado.</p>}
            <div className="space-y-4">
              {sts.map(function(st){
                var sp=obj(prog[st.id]);
                var stMods=mods.filter(function(m){return !m.studentId||m.studentId===st.id;});
                var done=stMods.filter(function(m){return (sp[m.id]||0)>=100;}).length;
                var pct=stMods.length>0?Math.round(stMods.reduce(function(a,m){return a+(sp[m.id]||0);},0)/stMods.length):0;
                return(
                  <div key={st.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-zinc-100 rounded-full flex items-center justify-center"><span className="material-symbols-outlined text-zinc-400 text-sm">person</span></div>
                        <div><p className="text-sm font-black text-black">{st.name||st.email}</p><p className="text-xs text-zinc-400 font-bold">{done+"/"+stMods.length+" aulas concluídas"}</p></div>
                      </div>
                      <span className="text-2xl font-black text-black">{pct+"%"}</span>
                    </div>
                    <div className="w-full h-1.5 bg-zinc-100 rounded-full overflow-hidden">
                      <div className="h-full bg-black transition-all" style={{width:pct+"%"}}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="mats" && (
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-2 block">Gerenciamento</span>
            <h2 className="text-2xl md:text-4xl font-headline font-black tracking-tighter text-black mb-8 md:mb-12">Materiais de Apoio</h2>
            <div className="bg-white rounded-xl p-8 shadow-sm border border-zinc-100 mb-8">
              <h3 className="text-sm font-black uppercase tracking-widest mb-6">Adicionar Material</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input className={inp} placeholder="Nome do material" value={newMat.name} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{name:e.target.value});});}}/>
                <select className={inp} value={newMat.type} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{type:e.target.value,link:""});}); setNewMatFile(null);}}>
                  <option value="PDF">PDF</option>
                  <option value="XLSX">Planilha (XLSX)</option>
                  <option value="DOC">Documento (DOC)</option>
                  <option value="ZIP">Arquivo ZIP</option>
                  <option value="Link">Link Externo</option>
                </select>
                {newMat.type==="Link"
                  ? <input className={inp+" md:col-span-2"} placeholder="Cole o link do material (URL)" type="url" value={newMat.link} onChange={function(e){setNewMat(function(v){return Object.assign({},v,{link:e.target.value});});}}/>
                  : <label className="md:col-span-2 flex items-center gap-4 cursor-pointer px-6 py-4 border-2 border-dashed border-zinc-200 rounded-xl hover:border-black transition-colors">
                      <span className="material-symbols-outlined text-zinc-400 text-2xl">upload_file</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-bold text-zinc-700 truncate">{newMatFile ? newMatFile.name : "Clique para selecionar arquivo"}</p>
                        <p className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mt-0.5">{newMatFile ? "Arquivo selecionado" : "PDF, XLSX, DOC, ZIP..."}</p>
                      </div>
                      {newMatFile && <button type="button" onClick={function(e){e.preventDefault();setNewMatFile(null);}} className="text-zinc-400 hover:text-[#ba1a1a] flex-shrink-0 transition-colors"><span className="material-symbols-outlined text-sm">close</span></button>}
                      <input type="file" className="sr-only" onChange={function(e){setNewMatFile(e.target.files[0]||null); e.target.value="";}}/>
                    </label>
                }
              </div>
              <button onClick={addMat} disabled={uploading} className={btnAdd+(uploading?" opacity-60 cursor-not-allowed":"")}>
                {uploading ? <span className="flex items-center gap-2"><span className="material-symbols-outlined text-sm" style={{animation:"spin 1s linear infinite"}}>progress_activity</span>Enviando...</span> : "Adicionar Material"}
              </button>
            </div>
            <div className="space-y-3">
              {mats.length===0 && <p className="text-zinc-400 text-sm py-8 text-center">Nenhum material cadastrado.</p>}
              {mats.map(function(mat){
                return(
                  <div key={mat.id} className="bg-white rounded-xl p-6 shadow-sm border border-zinc-100 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                      <div className="w-10 h-10 bg-zinc-100 rounded-lg flex items-center justify-center">
                        <span className="material-symbols-outlined text-zinc-400 text-sm">{mat.icon||"description"}</span>
                      </div>
                      <div>
                        <p className="text-sm font-black text-black">{mat.name}</p>
                        <p className="text-xs text-zinc-400 font-bold">{mat.type+(mat.size?" · "+mat.size:"")+(mat.ref?" · Ref: "+mat.ref:"")}</p>
                        {mat.link && <p className="text-xs text-zinc-300 truncate max-w-sm mt-0.5">{mat.link}</p>}
                      </div>
                    </div>
                    <button onClick={function(){delMat(mat.id);}} className="p-2 text-zinc-400 hover:text-[#ba1a1a] transition-colors"><span className="material-symbols-outlined text-sm">delete</span></button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </main>
      {toastMsg && <Toast msg={toastMsg} onDone={dismissToast}/>}
    </div>
  );
}

/* ── STUDENT PORTAL ── */
function StudentPortal({user, onLogout}){
  const [tab,setTab]=useState("inicio");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [mods,setMods]=useState([]);
  const [prog,setProg]=useState({});
  const [evts,setEvts]=useState([]);
  const [mats,setMats]=useState([]);
  const [openMod,setOpenMod]=useState(null);
  const [toastMsg,setToastMsg]=useState(null);
  const toast=function(msg){setToastMsg(msg);};
  const dismissToast=useCallback(function(){setToastMsg(null);},[]);
  var handleTab=function(id){setTab(id);setSidebarOpen(false);};
  useEffect(function(){
    try{
      var rawMods=ld(SK.MODULES,[]);
      var uid=user&&user.id;
      setMods(Array.isArray(rawMods)?rawMods.filter(function(m){return !m.studentId||m.studentId===uid;}):[]);
      var rawProg=ld(SK.PROGRESS,{});
      var safeProg=(rawProg&&typeof rawProg==="object")?rawProg:{};
      var userProg=(uid&&safeProg[uid]&&typeof safeProg[uid]==="object")?safeProg[uid]:safeProg;
      setProg(userProg||{});
      var rawEvts=ld(SK.EVENTS,[]);
      setEvts(Array.isArray(rawEvts)?rawEvts:[]);
      var rawMats=ld(SK.MATERIALS,[]);
      setMats(Array.isArray(rawMats)?rawMats:[]);
    }catch(e){console.error("StudentPortal useEffect error:",e);}
  },[]);
  var saveProg=function(modId, pct){
    var newProg=Object.assign({},prog,{[modId]:pct});
    setProg(newProg);
    var uid=user&&user.id;
    var fullProg=obj(ld(SK.PROGRESS,{}));
    if(uid){ fullProg[uid]=newProg; } else { fullProg=newProg; }
    sv(SK.PROGRESS,fullProg);
  };
  var phs={inicio:"Buscar aulas, materiais...",modulos:"Buscar aulas...",eventos:"Buscar eventos...",materiais:"Buscar materiais...",perfil:"Pesquisar..."};
  var tabLabels={inicio:"Início",modulos:"Aulas",eventos:"Eventos",materiais:"Materiais",perfil:"Perfil"};
  var userName=(user&&(user.name||(user.email?user.email.split("@")[0]:"")))||"Aluno";
  return(
    <div className="min-h-screen bg-[#fcf8f8]">
      <Sidebar tab={tab} onTab={handleTab} onLogout={onLogout} role="student" open={sidebarOpen} onClose={function(){setSidebarOpen(false);}} supportLink={user&&user.supportLink}/>
      <TopBar userName={userName} onProfile={function(){handleTab("perfil");}} title={tabLabels[tab]||"Dashboard"} onMenu={function(){setSidebarOpen(true);}}/>
      {openMod && <LessonPlayer mod={openMod} onClose={function(){setOpenMod(null);}} onComplete={function(id){saveProg(id,100);toast("Aula concluída!");}}/>}
      {tab==="inicio" && <SInicio user={user} mods={mods} prog={prog} evts={evts} mats={mats} onTab={handleTab} onOpenMod={setOpenMod} toast={toast}/>}
      {tab==="modulos" && <SModulos mods={mods} prog={prog} toast={toast} openMod={openMod} onOpenMod={setOpenMod} onProgChange={saveProg}/>}
      {tab==="eventos" && <SEventos evts={evts} toast={toast}/>}
      {tab==="materiais" && <SMateriais mats={mats} toast={toast}/>}
      {tab==="perfil" && <SPerfil user={user} onLogout={onLogout} toast={toast}/>}
      {/* Mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-100 z-40 flex">
        {[{id:"inicio",icon:"home"},{id:"modulos",icon:"play_circle"},{id:"eventos",icon:"event"},{id:"materiais",icon:"description"},{id:"perfil",icon:"person"}].map(function(item){return(
          <button key={item.id} onClick={function(){handleTab(item.id);}}
            className={"flex-1 flex flex-col items-center justify-center py-3 gap-0.5 transition-colors " + (tab===item.id?"text-black":"text-zinc-400")}>
            <span className="material-symbols-outlined text-xl" style={{fontVariationSettings:tab===item.id?"'FILL' 1,wght 400,GRAD 0,opsz 24":"'FILL' 0,wght 300,GRAD 0,opsz 24"}}>{item.icon}</span>
            <span className="text-[9px] font-bold uppercase tracking-wide">{tabLabels[item.id]}</span>
          </button>
        );})}
      </nav>
      <button onClick={function(){var link=user&&user.supportLink;if(link){window.open(link,"_blank");}else{toast("Link de suporte não configurado ainda. Aguarde o administrador.");} }}
        title="Falar com o Mentor"
        className="fixed bottom-20 md:bottom-8 right-4 md:right-8 w-12 h-12 md:w-14 md:h-14 bg-black rounded-full flex items-center justify-center shadow-2xl hover:bg-zinc-800 transition-all hover:scale-110 z-50">
        <span className="material-symbols-outlined text-white text-xl md:text-2xl">chat_bubble</span>
      </button>
      {toastMsg && <Toast msg={toastMsg} onDone={dismissToast}/>}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [u,sU]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(function(){
    loadAll().then(function(){
      try{
        var sess=restoreSession();
        if(sess){
          var adm=ld(SK.ADMIN,DEFAULT_ADMIN);
          if(sess.role==="admin"){
            if(sess.email===adm.email) sU(sess); else destroySession();
          } else if(sess.role==="student"){
            var sts=arr(ld(SK.STUDENTS,[]));
            var still=sts.find(function(s){return s.email===sess.email;});
            if(still) sU(Object.assign({role:"student"},still)); else destroySession();
          } else { destroySession(); }
        }
      }catch(e){console.error("restore session error:",e);}
      setLoading(false);
    }).catch(function(e){
      console.error("loadAll failed:",e);
      setLoading(false);
    });
  },[]);
  var login=function(user){sU(user);createSession(user);};
  var logout=function(){sU(null);destroySession();};
  if(loading) return(
    <div className="min-h-screen bg-[#fcf8f8] flex items-center justify-center">
      <div className="text-center">
        <div className="inline-flex w-16 h-16 rounded-xl items-center justify-center mb-6 overflow-hidden bg-black" style={{animation:"pulse 2s infinite"}}>
          <img src="https://nmmxjbojochvkhshyxvy.supabase.co/storage/v1/object/public/mentoria/MVP%20Mentoria%20logo%20whatsapp%20grupo%20(1).png" alt="Mentoria MVP" className="w-full h-full object-cover"/>
        </div>
        <p className="text-zinc-400 text-sm font-body">Carregando...</p>
      </div>
    </div>
  );
  return(
    React.createElement(React.Fragment, null,
      !u && React.createElement(LoginPage, {onLogin:login}),
      u && u.role==="admin" && React.createElement(AdminDash, {user:u, onLogout:logout}),
      u && u.role==="student" && React.createElement(StudentPortal, {user:u, onLogout:logout})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null,
    React.createElement(App, null)
  )
);
</script>
</body>
